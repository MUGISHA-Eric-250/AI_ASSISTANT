{% extends "base.html" %}

{% block title %}Upgrade Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="fas fa-arrow-up"></i> Upgrade to Permanent Account</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> You're currently using a guest account. 
                    Upgrade to save your research permanently!
                </div>
                
                <form method="POST" action="{{ url_for('upgrade_account') }}">
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Upgrade Account</button>
                </form>
                
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">
                        Continue as Guest
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
